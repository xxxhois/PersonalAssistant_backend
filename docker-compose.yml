services:
  db:
    image: ankane/pgvector:latest
    container_name: pa-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: personal_assistant
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pa-network

  chroma:
    image: chromadb/chroma:latest
    container_name: pa-chroma
    ports:
      # Keep host port 8001 free for the backend dev server on 8000.
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - pa-network

  redis:
    image: redis:7-alpine
    container_name: pa-redis
    ports:
      - "6379:6379"
    networks:
      - pa-network

networks:
  pa-network:
    driver: bridge

volumes:
  postgres_data:
  chroma_data:
